services:
  db:
    container_name: postgres
    image: postgres:16-alpine
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/Persistence/Sql/Migrations/001_InitialSchema.sql:/docker-entrypoint-initdb.d/__init__.sql:ro
      - ./backend/src/Persistence/Sql/Commands/create_team_transaction_v2.sql:/docker-entrypoint-initdb.d/dummyData.sql:ro
    env_file:
      - .env

  pgadmin:
    container_name: pgadmin_container
    image: dpage/pgadmin4
    restart: always
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

    env_file:
      - .env

  api:
    build:
      context: ./backend/src
      dockerfile: Dockerfile
    env_file:
      - .env
  
    image: kodeklubb_api
    depends_on:
      - db
    ports:
      - "5154:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

    volumes:
      - ./backend/src:/src

volumes:
  postgres_data:
  pgadmin_data: