services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kodeklubb
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minimalapi:
    image: minimalapi
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres

volumes:
  postgres_data:

